version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: moolah_minds_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (uncomment after building)
  # backend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: moolah_minds_api
  #   environment:
  #     DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  #     NODE_ENV: production
  #     JWT_SECRET: ${JWT_SECRET}
  #     PORT: 3000
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   command: >
  #     sh -c "npx prisma migrate deploy && node apps/backend/dist/server.js"

volumes:
  postgres_data:
    driver: local
